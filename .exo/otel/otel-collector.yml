receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000
    database: otel
    traces_table_name: otel_traces
    create_schema: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [clickhouse]
