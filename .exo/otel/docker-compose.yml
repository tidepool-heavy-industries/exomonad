# Grafana Tempo observability stack for exomonad swarm tracing.
#
# Usage:
#   docker compose -f .exo/otel/docker-compose.yml up -d
#
# Endpoints:
#   OTLP:       localhost:4317 (gRPC), localhost:4318 (HTTP)
#   Tempo API:  http://localhost:3200 (TraceQL queries)
#   Grafana UI: http://localhost:3000 (optional, trace visualization)
#
# Agents query traces via curl + TraceQL against Tempo's HTTP API.
# No MCP tools needed — TraceQL is well-represented in LLM training data.

services:
  tempo:
    image: grafana/tempo:2.6.1
    container_name: exo-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo HTTP API (TraceQL queries)
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.4.0
    container_name: exo-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/tempo.yaml
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    profiles:
      - grafana

volumes:
  tempo-data:
    name: exo-tempo-data
  grafana-data:
    name: exo-grafana-data
